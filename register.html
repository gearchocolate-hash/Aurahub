<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join AuraHub | Exclusive Membership</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-navy: #0A192F;
            --luxury-gold: #D4AF37;
            --white: #FFFFFF;
            --light-gray: #F5F7FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--primary-navy); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); width: 100%; max-width: 500px; padding: 50px; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo img { height: 60px; margin-bottom: 10px; }
        .auth-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--luxury-gold); text-align: center; margin-bottom: 10px; }
        .auth-subtitle { text-align: center; font-size: 13px; font-weight: 300; margin-bottom: 30px; color: rgba(255,255,255,0.6); }

        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--luxury-gold); }
        input, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 4px; color: var(--white); font-family: 'Montserrat', sans-serif; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--luxury-gold); background: rgba(255,255,255,0.1); }

        .btn-register { width: 100%; padding: 15px; background: var(--luxury-gold); color: var(--primary-navy); border: none; border-radius: 4px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-register:hover { background: #F3E5AB; transform: translateY(-2px); }

        /* Success Message Popup */
        #successModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-navy); z-index: 100; justify-content: center; align-items: center; text-align: center; }
        .id-card { background: var(--white); color: var(--primary-navy); padding: 40px; border-radius: 12px; border-top: 10px solid var(--luxury-gold); }
        .id-code { font-size: 32px; font-weight: 700; letter-spacing: 5px; margin: 20px 0; color: var(--primary-navy); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <img src="image_c8fa02.png" alt="AuraHub">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Unlock AI Aesthetic and VIP Concierge privileges.</p>
        </div>

        <form onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group"><label>First Name</label><input type="text" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" required></div>
            </div>

            <div class="form-row">
                <div class="form-group"><label>Age</label><input type="number" required></div>
                <div class="form-group">
                    <label>Country</label>
                    <select required>
                        <option value="Cambodia">Cambodia 🇰🇭</option>
                        <option value="Laos">Laos 🇱🇦</option>
                        <option value="Myanmar">Myanmar 🇲🇲</option>
                        <option value="Vietnam">Vietnam 🇻🇳</option>
                        <option value="Thailand">Thailand 🇹🇭</option>
                    </select>
                </div>
            </div>

            <div class="form-group"><label>Email Address</label><input type="email" required></div>
            
            <div class="form-row">
                <div class="form-group"><label>Phone Number</label><input type="text" required></div>
                <div class="form-group"><label>Zalo / Line ID</label><input type="text" placeholder="For Follow-up"></div>
            </div>

            <div class="form-group"><label>Password</label><input type="password" required></div>
            <div class="form-group"><label>Suggestion Code (Optional)</label><input type="text" placeholder="Invite Code"></div>

            <button type="submit" class="btn-register">Sign Up Now</button>
        </form>
    </div>

    <div id="successModal">
        <div class="id-card">
            <h2 style="font-family: 'Playfair Display';">Welcome to AuraHub</h2>
            <p style="font-size: 14px; margin-top: 10px;">Your Exclusive Member ID:</p>
            <div class="id-code" id="memberID">AU123456</div>
            <p style="font-size: 12px; color: #666; margin-bottom: 30px;">Use this code as your Suggestion ID to invite friends.</p>
            <a href="index.html" style="text-decoration: none; color: var(--luxury-gold); font-weight: 700;">Go to Home Page ➔</a>
        </div>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            // Generate Random ID: XzXzzzzz
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const id = letters.charAt(Math.floor(Math.random()*26)) + 
                       Math.floor(Math.random()*10) + 
                       letters.charAt(Math.floor(Math.random()*26)) + 
                       Math.floor(Math.random()*100000).toString().padStart(5, '0');
            
            document.getElementById('memberID').innerText = id;
            document.getElementById('successModal').style.display = 'flex';
        }
    </script>
</body>
</html>
