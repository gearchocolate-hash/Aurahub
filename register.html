<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register | AuraHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J1WJKHDS0X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J1WJKHDS0X');
    </script>

    <style>
        :root {
            --primary-navy: #0A192F;
            --luxury-gold: #D4AF37;
            --white: #FFFFFF;
            --light-gray: #F5F7FA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--primary-navy); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-container { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); width: 100%; max-width: 500px; padding: 50px; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transition: 0.3s; }
        .auth-logo { text-align: center; margin-bottom: 30px; }
        .auth-logo img { height: 60px; margin-bottom: 10px; }
        .auth-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--luxury-gold); text-align: center; margin-bottom: 10px; }
        .auth-subtitle { text-align: center; font-size: 13px; font-weight: 300; margin-bottom: 30px; color: rgba(255,255,255,0.6); }

        .form-group { margin-bottom: 20px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: var(--luxury-gold); }
        input, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 4px; color: var(--white); font-family: 'Montserrat', sans-serif; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--luxury-gold); background: rgba(255,255,255,0.1); }

        .btn-primary { width: 100%; padding: 15px; background: var(--luxury-gold); color: var(--primary-navy); border: none; border-radius: 4px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-primary:hover { background: #F3E5AB; transform: translateY(-2px); }
        .btn-primary:disabled { background: #888; cursor: not-allowed; transform: none; }

        .btn-secondary { width: 100%; padding: 15px; background: transparent; color: var(--luxury-gold); border: 1px solid var(--luxury-gold); border-radius: 4px; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-secondary:hover { background: rgba(212, 175, 55, 0.1); }

        .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .divider span { padding: 0 15px; color: rgba(255,255,255,0.5); font-size: 12px; }

        .hidden-view { display: none; }

        /* Success Message Popup */
        #successModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-navy); z-index: 100; justify-content: center; align-items: center; text-align: center; }
        .id-card { background: var(--white); color: var(--primary-navy); padding: 40px; border-radius: 12px; border-top: 10px solid var(--luxury-gold); max-width: 90%; }
        .id-code { font-size: 32px; font-weight: 700; letter-spacing: 5px; margin: 20px 0; color: var(--primary-navy); }

        @media (max-width: 768px) {
            .auth-container { padding: 30px 20px; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <img src="image_c8fa02.jpg" alt="AuraHub">
        </div>

        <div id="login-view">
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to access your VIP concierge.</p>

            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">Login</button>
            </form>

            <div class="divider"><span>OR</span></div>
            
            <button type="button" class="btn-secondary" onclick="toggleView('register')">Register New Account</button>
        </div>

        <div id="register-view" class="hidden-view">
            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Unlock AI Aesthetic and VIP privileges.</p>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group"><label>First Name</label><input type="text" name="firstName" required></div>
                    <div class="form-group"><label>Last Name</label><input type="text" name="lastName" required></div>
                </div>

                <div class="form-row">
                    <div class="form-group"><label>Age</label><input type="number" name="age" required></div>
                    <div class="form-group">
                        <label>Country</label>
                        <select name="country" required>
                            <option value="Cambodia">Cambodia 🇰🇭</option>
                            <option value="Laos">Laos 🇱🇦</option>
                            <option value="Myanmar">Myanmar 🇲🇲</option>
                            <option value="Vietnam">Vietnam 🇻🇳</option>
                            <option value="Thailand">Thailand 🇹🇭</option>
                        </select>
                    </div>
                </div>

                <div class="form-group"><label>Email Address</label><input type="email" name="email" required></div>
                
                <div class="form-row">
                    <div class="form-group"><label>Phone Number</label><input type="text" name="phone" required></div>
                    <div class="form-group"><label>Zalo / Line ID</label><input type="text" name="zaloLine" placeholder="For Follow-up"></div>
                </div>

                <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
                <div class="form-group"><label>Suggestion Code (Optional)</label><input type="text" name="suggestionCode" placeholder="Invite Code"></div>

                <button type="submit" class="btn-primary" id="submitRegBtn">Sign Up Now</button>
            </form>

            <div class="divider"><span>Already a member?</span></div>
            <button type="button" class="btn-secondary" onclick="toggleView('login')" style="border: none; margin-top: 0;">➔ Back to Login</button>
        </div>

    </div>

    <div id="successModal">
        <div class="id-card">
            <h2 style="font-family: 'Playfair Display';">Welcome to AuraHub</h2>
            <p style="font-size: 14px; margin-top: 10px;">Your Exclusive Member ID:</p>
            <div class="id-code" id="memberID">...</div>
            <p style="font-size: 12px; color: #666; margin-bottom: 30px;">Use this code as your Suggestion ID to invite friends.</p>
            <a href="index.html" style="text-decoration: none; color: var(--luxury-gold); font-weight: 700;">Go to Home Page ➔</a>
        </div>
    </div>

    <script>
        // ลิงก์ Google Apps Script ของคุณ
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxVwQNS9mE4ngyIWGAmuiQbxVYm-f_qN86WJT-1JjHiOcCv1eYB5pHELEp2zGht9fEl/exec';

        // ฟังก์ชันสลับหน้าต่าง Login/Register
        function toggleView(view) {
            if (view === 'register') {
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('register-view').classList.remove('hidden-view');
            } else {
                document.getElementById('register-view').classList.add('hidden-view');
                document.getElementById('login-view').classList.remove('hidden-view');
            }
        }

        // ==========================================
        // ระบบ 1: LOGIN
        // ==========================================
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'Verifying...';
            btn.disabled = true;

            const email = e.target.querySelector('input[name="loginEmail"]').value;
            const password = e.target.querySelector('input[name="loginPassword"]').value;

            const formData = new FormData();
            formData.append('action', 'login');
            formData.append('email', email);
            formData.append('password', password);

            fetch(GAS_URL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // เก็บรหัส ID ลงในเครื่อง และพุ่งไปหน้า index.html
                    localStorage.setItem('auraHubMemberId', data.memberId);
                    window.location.href = "index.html"; 
                } else {
                    alert('Login Failed: ' + data.message);
                    btn.innerText = 'Login';
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert('Connection error. Try again.');
                btn.innerText = 'Login';
                btn.disabled = false;
            });
        }

        // ==========================================
        // ระบบ 2: REGISTER
        // ==========================================
        function handleRegister(e) {
            e.preventDefault();
            const form = document.getElementById('registerForm');
            const btn = document.getElementById('submitRegBtn');
            
            btn.innerText = 'Processing...';
            btn.disabled = true;

            const formData = new FormData(form);
            formData.append('action', 'register');

            fetch(GAS_URL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // เก็บ ID ลงเครื่อง และโชว์หน้าต่างยินดีต้อนรับ
                    localStorage.setItem('auraHubMemberId', data.memberId);
                    document.getElementById('memberID').innerText = data.memberId;
                    document.getElementById('successModal').style.display = 'flex';
                } else {
                    alert('Error: ' + data.message);
                    btn.innerText = 'Sign Up Now';
                    btn.disabled = false;
                }
            })
            .catch(error => {
                alert('Connection failed. Please try again.');
                btn.innerText = 'Sign Up Now';
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
